name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[agents,web,dev,observability]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy)
        run: mypy .

      - name: Test (offline, mock backend)
        env:
          EXPENSE_MODEL_BACKEND: mock
        run: pytest -q

  bicep-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Bicep (type-check, no Azure needed)
        uses: azure/cli@v2
        with:
          inlineScript: az bicep build --file infra/main.bicep --stdout > /dev/null
