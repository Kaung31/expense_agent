name: Deploy infra

# Deploys the Bicep to Azure. Uses OIDC federated credentials (no stored secrets) —
# set repo secrets AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID.
on:
  workflow_dispatch:
    inputs:
      location:
        description: Azure region
        default: eastus

permissions:
  id-token: write        # required for OIDC azure/login
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: What-if (preview changes)
        uses: azure/cli@v2
        with:
          inlineScript: |
            az deployment sub what-if \
              --location ${{ inputs.location }} \
              --template-file infra/main.bicep \
              --parameters infra/main.bicepparam

      - name: Deploy
        uses: azure/cli@v2
        with:
          inlineScript: |
            az deployment sub create \
              --location ${{ inputs.location }} \
              --template-file infra/main.bicep \
              --parameters infra/main.bicepparam
